<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>致顾斐老师 ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #ffe6ea;
            overflow: hidden;
            font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", system-ui, sans-serif;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: pan-x pan-y;
        }
        #welcome-screen {
            text-align: center;
            position: absolute;
            z-index: 10;
            transition: opacity 0.8s ease-out;
            padding: 20px;
            width: 90%;
            max-width: 400px;
        }
        h1 {
            color: #ff4d79;
            font-size: clamp(1.8rem, 8vw, 2.6rem);
            margin-bottom: 16px;
            line-height: 1.3;
        }
        p.subtitle {
            color: #999;
            font-size: clamp(0.9rem, 4vw, 1.2rem);
            margin-bottom: 28px;
        }
        button {
            padding: 14px 36px;
            font-size: clamp(1rem, 5vw, 1.3rem);
            background-color: #ff4d79;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(255, 77, 121, 0.4);
            touch-action: manipulation;
            transition: transform 0.1s ease, box-shadow 0.2s;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            font-weight: bold;
            letter-spacing: 1px;
        }
        button:active {
            transform: scale(0.94);
            box-shadow: 0 3px 10px rgba(255, 77, 121, 0.3);
        }
        #heart-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: none;
        }
        .note {
            position: absolute;
            background: #fff;
            padding: 7px 14px;
            font-size: 14px;
            color: #444;
            box-shadow: 2px 4px 12px rgba(0,0,0,0.08);
            border-radius: 20px;
            opacity: 0;
            white-space: nowrap;
            border-bottom: 3px solid #ffeff2;
            transition: all 1.8s cubic-bezier(0.25, 1, 0.5, 1);
            cursor: pointer;
            touch-action: manipulation;
            z-index: 2;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            min-width: 48px;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 500;
        }
        .note.is-heart {
            background: #ff4d79 !important;
            color: white !important;
            border-bottom-color: #d6335c !important;
            font-size: 20px !important;
            padding: 10px 12px !important;
            border-radius: 50% !important;
            box-shadow: 0 0 16px rgba(255, 77, 121, 0.6) !important;
            transform: scale(1.2) !important;
            min-width: 44px;
            min-height: 44px;
        }
        /* ✅ 中心卡片缩小 */
        .center-card {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 12px 18px;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
            text-align: center;
            z-index: 5;
            opacity: 0;
            animation: popIn 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) 5.5s forwards;
            max-width: 65%;
            pointer-events: none;
            margin: 0;
        }
        .center-card h2 {
            margin: 0;
            color: #ff4d79;
            font-size: clamp(0.9rem, 4vw, 1.3rem);
            line-height: 1.3;
        }
        .center-card p {
            margin: 4px 0 0;
            color: #666;
            font-size: clamp(0.75rem, 3vw, 0.9rem);
        }
        @keyframes popIn {
            0% { transform: translate(-50%, -50%) scale(0.3); opacity: 0; }
            80% { transform: translate(-50%, -50%) scale(1.05); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }
        .bottom-left-group {
            position: fixed;
            bottom: 14px;
            left: 14px;
            display: flex;
            gap: 8px;
            z-index: 999;
            align-items: center;
        }
        .hyl-badge {
            font-size: 20px;
            color: #ccc;
            cursor: pointer;
            user-select: none;
            padding: 6px 10px;
            line-height: 1;
            transition: all 0.3s ease;
            touch-action: manipulation;
            background: rgba(255,255,255,0.5);
            border-radius: 20px;
            backdrop-filter: blur(4px);
            -webkit-tap-highlight-color: transparent;
            min-width: 38px;
            min-height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 1px 5px rgba(0,0,0,0.04);
        }
        .hyl-badge.tip-show {
            font-size: 13px;
            color: #777;
            background: rgba(255,255,255,0.85);
            white-space: nowrap;
            padding: 6px 16px;
        }
        .easter-egg-btn {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: #ff4d79;
            border: none;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.8s ease, transform 0.2s ease;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            box-shadow: 0 2px 8px rgba(255, 77, 121, 0.3);
            animation: subtlePulse 2.5s ease-in-out infinite;
            padding: 0;
            flex-shrink: 0;
        }
        .easter-egg-btn.visible {
            opacity: 0.6;
        }
        .easter-egg-btn:active {
            transform: scale(1.4);
            opacity: 1;
        }
        @keyframes subtlePulse {
            0%, 100% { opacity: 0.45; }
            50% { opacity: 0.8; }
        }
        .image-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0,0,0,0.92);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .image-overlay.visible {
            display: flex;
        }
        .image-overlay img {
            max-width: 95%;
            max-height: 80vh;
            border-radius: 10px;
            box-shadow: 0 8px 35px rgba(0,0,0,0.5);
            object-fit: contain;
        }
        .close-btn {
            margin-top: 16px;
            padding: 10px 30px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid rgba(255,255,255,0.5);
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            touch-action: manipulation;
            transition: background 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .close-btn:active {
            background: rgba(255,255,255,0.4);
        }
    </style>
</head>
<body>
    <div id="welcome-screen">
        <h1>致顾斐老师 ❤️</h1>
        <p class="subtitle">学生：孙逸林 敬上</p>
        <button id="start-btn">✨ 开启惊喜</button>
    </div>
    <div id="heart-container">
        <div class="center-card">
            <h2>满心欢喜，皆源于您</h2>
            <p>祝顾老师天天开心！</p>
        </div>
    </div>
    <div class="bottom-left-group">
        <div class="hyl-badge" id="hyl-tip">❗</div>
        <button class="easter-egg-btn" id="easter-egg-btn" title="点我"></button>
    </div>
    <div class="image-overlay" id="image-overlay">
        <img src="https://s41.ax1x.com/2026/07/06/pmBWMSx.jpg" alt="彩蛋图片">
        <button class="close-btn" id="close-overlay">✕ 关闭</button>
    </div>

    <script>
        const messages = [
            "桃李满天下","春晖遍四方","教诲如春风","师恩深似海",
            "身体健康","工作顺利","万事如意","笑口常开",
            "永远年轻","美丽大方","教学有成","生活美满",
            "Happy Day","Best Teacher","Good Luck","平安喜乐",
            "前程似锦","岁月静好","温柔以待","心想事成"
        ];

        let allNotes = [];
        let heartContainer = null;
        const TOTAL_NOTES = 30;

        const easterEggBtn = document.getElementById('easter-egg-btn');
        const imageOverlay = document.getElementById('image-overlay');
        const closeOverlayBtn = document.getElementById('close-overlay');

        document.getElementById('start-btn').addEventListener('click', function(){
            const ws = document.getElementById('welcome-screen');
            ws.style.opacity = '0';
            setTimeout(() => {
                ws.style.display = 'none';
                heartContainer = document.getElementById('heart-container');
                heartContainer.style.display = 'block';
                createHeartNotes();
                setTimeout(() => {
                    easterEggBtn.classList.add('visible');
                }, 6000);
            }, 800);
        });

        easterEggBtn.addEventListener('click', function(e){
            e.stopPropagation();
            imageOverlay.classList.add('visible');
        });
        closeOverlayBtn.addEventListener('click', function(e){
            e.stopPropagation();
            imageOverlay.classList.remove('visible');
        });
        imageOverlay.addEventListener('click', function(e){
            if(e.target === imageOverlay) imageOverlay.classList.remove('visible');
        });

        const hylTip = document.getElementById('hyl-tip');
        let tipVisible = false;
        hylTip.addEventListener('click', function(e){
            e.stopPropagation();
            if(!tipVisible){
                this.innerText = '此网页由 H YL 书写';
                this.classList.add('tip-show');
                tipVisible = true;
            } else {
                this.innerText = '❗';
                this.classList.remove('tip-show');
                tipVisible = false;
            }
        });

        function getHeartPoint(t, scale) {
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
            return { x: x * scale, y: y * scale };
        }

        function getScale() {
            const sw = window.innerWidth;
            const sh = window.innerHeight;
            const minDim = Math.min(sw, sh);
            if (minDim < 380) return 7.0;
            if (minDim < 450) return 8.0;
            if (minDim < 600) return 9.5;
            if (minDim < 800) return 11.0;
            return 13.0;
        }

        function repositionNotes() {
            if (!allNotes.length || !heartContainer) return;
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            const scale = getScale();
            allNotes.forEach((note, i) => {
                const t = (Math.PI * 2 * i) / TOTAL_NOTES;
                const { x, y } = getHeartPoint(t, scale);
                note.style.left = (centerX + x) + 'px';
                note.style.top = (centerY + y) + 'px';
                if (note.classList.contains('is-heart')) {
                    note.style.transform = `rotate(${(Math.random()-0.5)*10}deg) scale(1.2)`;
                } else {
                    note.style.transform = `rotate(${(Math.random()-0.5)*8}deg) scale(1)`;
                }
            });
        }

        function createHeartNotes(){
            const container = heartContainer;
            allNotes.forEach(n => n.remove());
            allNotes = [];

            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            const scale = getScale();

            for(let i = 0; i < TOTAL_NOTES; i++){
                const note = document.createElement('div');
                note.classList.add('note');
                note.innerText = messages[Math.floor(Math.random() * messages.length)];

                const t = (Math.PI * 2 * i) / TOTAL_NOTES;
                const { x, y } = getHeartPoint(t, scale);
                const finalX = centerX + x;
                const finalY = centerY + y;

                note.style.left = (Math.random() * window.innerWidth) + 'px';
                note.style.top = (Math.random() * window.innerHeight) + 'px';
                note.style.transform = `rotate(${(Math.random()-0.5)*60}deg) scale(0.8)`;
                container.appendChild(note);
                allNotes.push(note);

                setTimeout(() => {
                    note.style.opacity = '1';
                    note.style.left = centerX + 'px';
                    note.style.top = centerY + 'px';
                    note.style.transform = `rotate(${(Math.random()-0.5)*20}deg) scale(1)`;
                }, 600 + i * 40);

                setTimeout(() => {
                    note.style.left = finalX + 'px';
                    note.style.top = finalY + 'px';
                    note.style.transform = `rotate(${(Math.random()-0.5)*6}deg) scale(1)`;
                }, 3200 + i * 45);

                note.addEventListener('click', function(e){
                    e.stopPropagation();
                    if(!this.classList.contains('is-heart')){
                        this.classList.add('is-heart');
                        this.innerText = '❤️';
                        const idx = allNotes.indexOf(this);
                        if(idx !== -1){
                            const ti = (Math.PI * 2 * idx) / TOTAL_NOTES;
                            const sc = getScale();
                            const { x: px, y: py } = getHeartPoint(ti, sc);
                            this.style.left = (window.innerWidth/2 + px) + 'px';
                            this.style.top = (window.innerHeight/2 + py) + 'px';
                        }
                    }
                });
            }
        }

        let resizeDebounce = null;
        window.addEventListener('resize', () => {
            if (resizeDebounce) clearTimeout(resizeDebounce);
            resizeDebounce = setTimeout(repositionNotes, 100);
        });
        window.addEventListener('orientationchange', () => {
            setTimeout(repositionNotes, 200);
        });
        document.addEventListener('dblclick', e => e.preventDefault(), { passive: false });
    </script>
</body>
</html>
