<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>致顾斐老师 ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #ffe6ea;
            overflow: hidden;
            font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", system-ui, sans-serif;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: pan-x pan-y;
        }
        #welcome-screen {
            text-align: center;
            position: absolute;
            z-index: 10;
            transition: opacity 0.8s ease-out;
            padding: 20px;
            width: 90%;
            max-width: 400px;
        }
        h1 {
            color: #ff4d79;
            font-size: clamp(1.8rem, 8vw, 2.6rem);
            margin-bottom: 16px;
            line-height: 1.3;
        }
        p.subtitle {
            color: #999;
            font-size: clamp(0.9rem, 4vw, 1.2rem);
            margin-bottom: 28px;
        }
        button {
            padding: 14px 36px;
            font-size: clamp(1rem, 5vw, 1.3rem);
            background-color: #ff4d79;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(255, 77, 121, 0.4);
            touch-action: manipulation;
            transition: transform 0.1s ease, box-shadow 0.2s;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            font-weight: bold;
            letter-spacing: 1px;
        }
        button:active {
            transform: scale(0.94);
            box-shadow: 0 3px 10px rgba(255, 77, 121, 0.3);
        }
        #heart-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: none;
        }
        .note {
            position: absolute;
            background: #fff;
            padding: 6px 12px;
            font-size: 13px;
            color: #555;
            box-shadow: 2px 4px 12px rgba(0,0,0,0.08);
            border-radius: 20px;
            opacity: 0;
            white-space: nowrap;
            border-bottom: 3px solid #ffeff2;
            transition: all 1.8s cubic-bezier(0.25, 1, 0.5, 1);
            cursor: pointer;
            touch-action: manipulation;
            z-index: 2;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            min-width: 44px;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .note.is-heart {
            background: #ff4d79 !important;
            color: white !important;
            border-bottom-color: #d6335c !important;
            font-size: 18px !important;
            padding: 10px 14px !important;
            border-radius: 50% !important;
            box-shadow: 0 0 18px rgba(255, 77, 121, 0.7) !important;
            transform: scale(1.25) !important;
            min-width: 44px;
            min-height: 44px;
        }
        .center-card {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 22px 28px;
            border-radius: 16px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.12);
            text-align: center;
            z-index: 5;
            opacity: 0;
            animation: popIn 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) 5.5s forwards;
            max-width: 85%;
            pointer-events: none;
        }
        .center-card h2 {
            margin: 0;
            color: #ff4d79;
            font-size: clamp(1.2rem, 6vw, 1.8rem);
            line-height: 1.4;
        }
        .center-card p {
            margin: 10px 0 0;
            color: #666;
            font-size: clamp(0.9rem, 4vw, 1.1rem);
        }
        @keyframes popIn {
            0% { transform: translate(-50%, -50%) scale(0.3); opacity: 0; }
            80% { transform: translate(-50%, -50%) scale(1.05); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }
        .hyl-badge {
            position: fixed;
            bottom: 16px;
            left: 16px;
            font-size: 26px;
            color: #ccc;
            cursor: pointer;
            z-index: 999;
            user-select: none;
            padding: 10px 14px;
            line-height: 1;
            transition: all 0.3s ease;
            touch-action: manipulation;
            background: rgba(255,255,255,0.5);
            border-radius: 30px;
            backdrop-filter: blur(4px);
            -webkit-tap-highlight-color: transparent;
            min-width: 44px;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .hyl-badge.tip-show {
            font-size: 15px;
            color: #777;
            background: rgba(255,255,255,0.85);
            white-space: nowrap;
            padding: 8px 18px;
        }
    </style>
</head>
<body>
    <div id="welcome-screen">
        <h1>致顾斐老师 ❤️</h1>
        <p class="subtitle">学生：孙逸林 敬上</p>
        <button id="start-btn">✨ 开启惊喜</button>
    </div>
    <div id="heart-container">
        <div class="center-card">
            <h2>满心欢喜，皆源于您</h2>
            <p>祝顾老师天天开心！</p>
        </div>
    </div>
    <div class="hyl-badge" id="hyl-tip">❗</div>

    <script>
        const messages = [
            "桃李满天下","春晖遍四方","教诲如春风","师恩深似海",
            "身体健康","工作顺利","万事如意","笑口常开",
            "永远年轻","美丽大方","教学有成","生活美满",
            "Happy Day","Best Teacher","Good Luck","平安喜乐",
            "前程似锦","岁月静好","温柔以待","心想事成"
        ];

        let allNotes = [];
        let heartContainer = null;
        let animationTimeout = null;

        // ✅ 纸条总数从90减少到65，间距更宽松
        const TOTAL_NOTES = 65;

        document.getElementById('start-btn').addEventListener('click', function(){
            const ws = document.getElementById('welcome-screen');
            ws.style.opacity = '0';
            setTimeout(() => {
                ws.style.display = 'none';
                heartContainer = document.getElementById('heart-container');
                heartContainer.style.display = 'block';
                createHeartNotes();
            }, 800);
        });

        const hylTip = document.getElementById('hyl-tip');
        let tipVisible = false;
        hylTip.addEventListener('click', function(e){
            e.stopPropagation();
            if(!tipVisible){
                this.innerText = '此网页由 H YL 书写';
                this.classList.add('tip-show');
                tipVisible = true;
            } else {
                this.innerText = '❗';
                this.classList.remove('tip-show');
                tipVisible = false;
            }
        });

        function getHeartPoint(t, scale) {
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
            return { x: x * scale, y: y * scale };
        }

        // ✅ 略微增大缩放比例，让爱心更大但纸条更稀疏
        function getScale() {
            const sw = window.innerWidth;
            const sh = window.innerHeight;
            const minDim = Math.min(sw, sh);
            if (minDim < 380) return 11.5;
            if (minDim < 500) return 13.5;
            if (minDim < 700) return 15.5;
            return 17.5;
        }

        function repositionNotes() {
            if (!allNotes.length || !heartContainer) return;
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            const scale = getScale();
            const totalNotes = allNotes.length;
            
            allNotes.forEach((note, i) => {
                const t = (Math.PI * 2 * i) / totalNotes;
                const { x, y } = getHeartPoint(t, scale);
                const finalX = centerX + x;
                const finalY = centerY + y;
                note.style.left = finalX + 'px';
                note.style.top = finalY + 'px';
                if (note.classList.contains('is-heart')) {
                    note.style.transform = `rotate(${(Math.random()-0.5)*10}deg) scale(1.25)`;
                } else {
                    note.style.transform = `rotate(${(Math.random()-0.5)*10}deg) scale(1)`;
                }
            });
        }

        function createHeartNotes(){
            const container = heartContainer;
            allNotes.forEach(n => n.remove());
            allNotes = [];
            if (animationTimeout) clearTimeout(animationTimeout);

            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            const scale = getScale();

            for(let i = 0; i < TOTAL_NOTES; i++){
                const note = document.createElement('div');
                note.classList.add('note');
                note.innerText = messages[Math.floor(Math.random() * messages.length)];
                
                const t = (Math.PI * 2 * i) / TOTAL_NOTES;
                const { x, y } = getHeartPoint(t, scale);
                const finalX = centerX + x;
                const finalY = centerY + y;

                // 随机起始位置
                note.style.left = (Math.random() * window.innerWidth) + 'px';
                note.style.top = (Math.random() * window.innerHeight) + 'px';
                note.style.transform = `rotate(${(Math.random()-0.5)*60}deg) scale(0.8)`;
                container.appendChild(note);
                allNotes.push(note);

                // 阶段一：飞向中心（间隔稍大，因为纸条少了）
                setTimeout(() => {
                    note.style.opacity = '1';
                    note.style.left = centerX + 'px';
                    note.style.top = centerY + 'px';
                    note.style.transform = `rotate(${(Math.random()-0.5)*20}deg) scale(1)`;
                }, 600 + i * 30);

                // 阶段二：散开成爱心
                setTimeout(() => {
                    note.style.left = finalX + 'px';
                    note.style.top = finalY + 'px';
                    note.style.transform = `rotate(${(Math.random()-0.5)*10}deg) scale(1)`;
                }, 3200 + i * 35);

                // 点击纸条变成爱心
                note.addEventListener('click', function(e){
                    e.stopPropagation();
                    if(!this.classList.contains('is-heart')){
                        this.classList.add('is-heart');
                        this.innerText = '❤️';
                        const idx = allNotes.indexOf(this);
                        if(idx !== -1){
                            const ti = (Math.PI * 2 * idx) / TOTAL_NOTES;
                            const sc = getScale();
                            const { x: px, y: py } = getHeartPoint(ti, sc);
                            this.style.left = (window.innerWidth/2 + px) + 'px';
                            this.style.top = (window.innerHeight/2 + py) + 'px';
                        }
                    }
                });
            }
        }

        let resizeDebounce = null;
        window.addEventListener('resize', () => {
            if (resizeDebounce) clearTimeout(resizeDebounce);
            resizeDebounce = setTimeout(() => {
                repositionNotes();
            }, 100);
        });

        window.addEventListener('orientationchange', () => {
            setTimeout(() => {
                repositionNotes();
            }, 200);
        });

        document.addEventListener('dblclick', function(e) {
            e.preventDefault();
        }, { passive: false });
    </script>
</body>
</html>
