<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>致顾斐老师</title>
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #ffe6ea; /* 初始背景色 */
            transition: background-color 0.5s ease; /* 背景变色过渡 */
            overflow: hidden;
            font-family: "Microsoft YaHei", sans-serif;
            height: 100vh; width: 100vw;
            display: flex; justify-content: center; align-items: center;
        }

        /* 欢迎页样式 */
        #welcome-screen {
            text-align: center; position: absolute; z-index: 100;
            background: rgba(255, 255, 255, 0.9);
            padding: 40px; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: opacity 1s ease-out;
        }
        h1 { color: #ff4d79; font-size: 2rem; margin-bottom: 10px; }
        p.subtitle { color: #666; font-size: 1rem; margin-bottom: 30px; }
        button {
            padding: 12px 30px; font-size: 1.1rem;
            background: linear-gradient(45deg, #ff9a9e, #fad0c4);
            border: none; border-radius: 50px; color: white;
            cursor: pointer; box-shadow: 0 5px 15px rgba(255, 77, 121, 0.3);
            transition: transform 0.2s;
        }
        button:active { transform: scale(0.95); }

        /* 小纸条样式 */
        .note {
            position: absolute;
            width: 80px; height: 40px;
            background: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: flex; justify-content: center; align-items: center;
            font-size: 10px; color: #555;
            border-radius: 4px;
            /* 关键：让纸条在移动时更平滑 */
            will-change: transform, left, top; 
            z-index: 1;
            transition: all 1.5s cubic-bezier(0.25, 0.8, 0.25, 1); /* 慢速平滑过渡 */
        }

        /* 中间大卡片样式 - 磨砂玻璃防遮挡 */
        #center-card {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0); /* 初始缩小 */
            width: 260px; padding: 30px 20px;
            background: rgba(255, 255, 255, 0.85); /* 半透明白 */
            backdrop-filter: blur(8px); /* 磨砂效果 */
            -webkit-backdrop-filter: blur(8px);
            border: 2px solid rgba(255, 255, 255, 0.9);
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(255, 77, 121, 0.2);
            z-index: 50; /* 保证在最上层 */
            opacity: 0;
            transition: all 1s ease-out;
            cursor: pointer; /* 提示可点击 */
        }
        #center-card h2 {
            color: #ff4d79; font-size: 1.4rem; margin: 0 0 10px 0; line-height: 1.4;
        }
        #center-card p {
            color: #555; font-size: 1rem; margin: 0; font-weight: bold;
        }

        /* 左下角水印/感叹号 */
        #watermark {
            position: absolute; bottom: 20px; left: 20px;
            display: flex; align-items: center; gap: 8px;
            color: #888; font-size: 0.9rem;
            cursor: pointer; z-index: 100;
            background: rgba(255,255,255,0.6);
            padding: 8px 12px; border-radius: 20px;
            transition: background 0.3s;
        }
        #watermark:hover { background: rgba(255,255,255,0.9); }
        .icon-exclaim {
            display: inline-block; width: 20px; height: 20px;
            background: #ff4d79; color: white;
            border-radius: 50%; text-align: center; line-height: 20px;
            font-weight: bold; font-size: 12px;
        }
        
        /* 隐藏类 */
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- 欢迎界面 -->
    <div id="welcome-screen">
        <h1>致顾斐老师 💌</h1>
        <p class="subtitle">有一份特别的惊喜请查收</p>
        <button onclick="startAnimation()">开启祝福</button>
    </div>

    <!-- 中间大卡片 -->
    <div id="center-card">
        <h2>满心欢喜，<br>皆源于您</h2>
        <p>祝顾老师天天开心！</p>
    </div>

    <!-- 左下角水印 -->
    <div id="watermark" onclick="changeBgColor()">
        <span class="icon-exclaim">!</span>
        <span>此网站由 HYL 制作</span>
    </div>

    <script>
        // 祝福语库
        const messages = [
            "身体健康", "万事如意", "桃李满天下", "永远年轻", 
            "工作顺利", "笑口常开", "生活美满", "幸福安康", 
            "教泽绵长", "春晖遍四方", "心想事成", "平安喜乐",
            "Gufeilaoshi", "Best Teacher", "Happy Day", "Love You",
            "美丽大方", "温柔善良", "学术有成", "日日顺心"
        ];

        // 配色方案
        const bgColors = ["#ffe6ea", "#e6f7ff", "#fffbe6", "#f6ffed", "#f9f0ff"];
        let colorIndex = 0;

        function startAnimation() {
            document.getElementById('welcome-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('welcome-screen').classList.add('hidden');
                createNotes();
            }, 1000);
        }

        function createNotes() {
            const count = 60; // 纸条数量
            const notes = [];
            
            // 1. 生成纸条并放在屏幕外
            for (let i = 0; i < count; i++) {
                const note = document.createElement('div');
                note.className = 'note';
                note.innerText = messages[Math.floor(Math.random() * messages.length)];
                
                // 随机散落在屏幕四周
                const angle = Math.random() * Math.PI * 2;
                const radius = Math.max(window.innerWidth, window.innerHeight) * 0.8;
                const startX = window.innerWidth / 2 + Math.cos(angle) * radius;
                const startY = window.innerHeight / 2 + Math.sin(angle) * radius;
                
                note.style.left = startX + 'px';
                note.style.top = startY + 'px';
                note.style.transform = `rotate(${Math.random() * 360}deg)`;
                
                document.body.appendChild(note);
                notes.push({ el: note, index: i });
            }

            // 2. 第一阶段：聚拢到中心 (叠在一起)
            setTimeout(() => {
                notes.forEach(item => {
                    item.el.style.left = (window.innerWidth / 2 - 40) + 'px'; // 居中
                    item.el.style.top = (window.innerHeight / 2 - 20) + 'px';
                    item.el.style.transform = `rotate(${Math.random() * 20 - 10}deg) scale(0.8)`; // 稍微缩小堆叠
                    item.el.style.zIndex = item.index;
                });
            }, 100);

            // 3. 第二阶段：散开成爱心
            setTimeout(() => {
                formHeart(notes);
                showCenterCard();
            }, 2500); // 聚拢后停留1.5秒
        }

        function formHeart(notes) {
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            const scale = Math.min(window.innerWidth, window.innerHeight) / 45; // 适配屏幕大小

            notes.forEach((item, i) => {
                // 爱心参数方程
                const t = (i / notes.length) * 2 * Math.PI;
                // 16sin^3(t), 13cos(t)-5cos(2t)... 是经典爱心公式
                const x = 16 * Math.pow(Math.sin(t), 3);
                const y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)); 

                // 计算目标位置
                const targetX = centerX + x * scale - 40; // -40是为了居中(纸条宽80的一半)
                const targetY = centerY + y * scale - 20; 

                item.el.style.left = targetX + 'px';
                item.el.style.top = targetY + 'px';
                // 恢复旋转和大小，增加一点随机性
                item.el.style.transform = `rotate(${Math.random() * 30 - 15}deg) scale(1)`;
                item.el.style.zIndex = 10; // 确保都在卡片下面
            });
        }

        function showCenterCard() {
            const card = document.getElementById('center-card');
            card.style.opacity = '1';
            card.style.transform = 'translate(-50%, -50%) scale(1)';
        }

        // 点击左下角改变背景色
        function changeBgColor() {
            colorIndex = (colorIndex + 1) % bgColors.length;
            document.body.style.backgroundColor = bgColors[colorIndex];
        }

        // 点击中间卡片变色（额外福利）
        document.getElementById('center-card').addEventListener('click', function() {
             this.style.backgroundColor = this.style.backgroundColor === 'rgba(255, 255, 255, 0.85)' ? 'rgba(255, 230, 234, 0.9)' : 'rgba(255, 255, 255, 0.85)';
        });

    </script>
</body>
</html>
